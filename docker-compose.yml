version: '3.9'

services:
  # Backend service running FastAPI + Ollama client
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: chocomi-backend
    ports:
      - "8000:8000"
    environment:
      - OLLAMA_API_URL=http://host.docker.internal:11434
      - PYTHONUNBUFFERED=1
    volumes:
      - ./backend/chocomi_docs:/app/chocomi_docs
      - ./backend/crm_data.json:/app/crm_data.json
      - ./backend/.chroma_db:/app/.chroma_db
    depends_on:
      - ollama
    networks:
      - chocomi-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 20s

  # Ollama service for local LLM inference
  ollama:
    image: ollama/ollama:latest
    container_name: chocomi-ollama
    ports:
      - "11434:11434"
    environment:
      - OLLAMA_NUM_PARALLEL=1
      - OLLAMA_NUM_THREAD=4
    volumes:
      - ollama-models:/root/.ollama
    networks:
      - chocomi-network
    command: serve

  # Frontend service (Next.js development server)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: chocomi-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend
    networks:
      - chocomi-network
    volumes:
      - ./frontend:/app
      - /app/node_modules

networks:
  chocomi-network:
    driver: bridge

volumes:
  ollama-models:
    driver: local
